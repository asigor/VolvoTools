name: Build VolvoTools

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            conan_arch: x86
            cmake_arch: Win32
          - arch: x64
            conan_arch: x86_64
            cmake_arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Conan and detect profile
        run: |
          pip install conan
          conan profile detect --force

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install dependencies
        run: |
          conan install . --build=missing --profile=default -s arch=${{ matrix.conan_arch }} -s compiler.cppstd=17

      - name: Configure CMake
        run: cmake --preset conan-default -A ${{ matrix.cmake_arch }}

      - name: Build project
        run: cmake --build build --config Release --parallel 4

      - name: Build installer (NSIS EXE)
        shell: pwsh
        run: |
          cpack --config build/CPackConfig.cmake -C Release -G NSIS
          New-Item -ItemType Directory -Path installers/${{ matrix.arch }} -Force | Out-Null
          Get-ChildItem -Path build -Filter "VolvoTools-*.exe" | Copy-Item -Destination installers/${{ matrix.arch }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VolvoTools_Installer_${{ matrix.arch }}
          path: installers/${{ matrix.arch }}/*.exe
          if-no-files-found: error

  release:
    needs:
      - build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download x64 installer
        uses: actions/download-artifact@v4
        with:
          name: VolvoTools_Installer_x64
          path: artifacts/x64

      - name: Download x86 installer
        uses: actions/download-artifact@v4
        with:
          name: VolvoTools_Installer_x86
          path: artifacts/x86

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.exe
