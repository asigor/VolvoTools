name: Build VolvoTools

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Conan and detect profile
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan numpy
          conan profile detect --force

      - name: Install NSIS
        run: choco install nsis -y

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dependencies
        run: |
          conan install . --build=missing --profile=default -s arch=x86_64 -s compiler.cppstd=17

      - name: Configure CMake
        run: cmake --preset conan-default -A x64

      - name: Build project
        run: cmake --build build --config Release --parallel 4

      - name: Build installer (NSIS EXE)
        shell: pwsh
        run: |
          cpack --config build/CPackConfig.cmake -C Release -G NSIS
          New-Item -ItemType Directory -Path installers -Force | Out-Null
          $pkg = Get-ChildItem -Path ${{ github.workspace }} -Filter "VolvoTools-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $pkg) {
            $pkg = Get-ChildItem -Path build -Filter "VolvoTools-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }
          if (-not $pkg) {
            throw "No installer exe produced by cpack."
          }
          Copy-Item -Path $pkg.FullName -Destination installers/VolvoTools_Installer.exe

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VolvoTools_Installer
          path: installers/VolvoTools_Installer.exe
          if-no-files-found: error

  release:
    needs:
      - build
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: VolvoTools_Installer
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/VolvoTools_Installer.exe
